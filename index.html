<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sumit Kushwaha | Professional Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #3b82f6;
            --bg-color: #0f172a;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --card-bg: #1e293b;
            --transition: all 0.3s ease-in-out;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; scroll-behavior: smooth; }
        body { background-color: var(--bg-color); color: var(--text-light); line-height: 1.6; overflow-x: hidden; }
        nav { position: fixed; top: 0; width: 100%; padding: 1.2rem 5%; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); display: flex; justify-content: space-between; align-items: center; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo { font-size: 1.5rem; font-weight: 700; color: var(--text-light); text-decoration: none; letter-spacing: 1px; }
        .logo span { color: var(--primary-color); }
        .nav-links a { color: var(--text-light); text-decoration: none; margin-left: 2rem; font-weight: 500; transition: var(--transition); }
        .nav-links a:hover { color: var(--primary-color); }
        .hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 0 5%; background: radial-gradient(circle at top, #1e293b 0%, #0f172a 100%); }
        .hero h1 { font-size: 4.5rem; margin-bottom: 1rem; }
        .hero h1 span { color: var(--primary-color); }
        .hero p { font-size: 1.2rem; color: var(--text-muted); max-width: 600px; margin-bottom: 2rem; }
        .btn { padding: 0.8rem 2rem; background-color: var(--primary-color); color: white; text-decoration: none; border-radius: 8px; font-weight: 600; border: 2px solid var(--primary-color); transition: var(--transition); }
        .btn:hover { background-color: transparent; box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3); transform: translateY(-3px); }
        section { padding: 6rem 5%; }
        .section-title { text-align: center; font-size: 2.5rem; margin-bottom: 3rem; position: relative; color: var(--text-light); }
        .section-title::after { content: ''; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); width: 80px; height: 4px; background-color: var(--primary-color); border-radius: 2px; }
        footer { text-align: center; padding: 2rem; background: var(--card-bg); color: var(--text-muted); border-top: 1px solid rgba(255,255,255,0.05); margin-top: 4rem; }
    </style>
</head>
<body>
    <nav>
        <a href="#" class="logo">Sumit<span>.</span></a>
        <div class="nav-links">
            <a href="#home">Home</a>
            <a href="#work">My Work</a>
            <a href="#contact">Contact</a>
        </div>
    </nav>
    <section id="home" class="hero">
        <h1>Hi, I'm <span>Sumit Kushwaha</span></h1>
        <p>I build interactive, responsive, and scalable digital experiences.</p>
        <a href="#work" class="btn">Explore My Work</a>
    </section>
    <section id="work">
        <h2 class="section-title">Explore My Work</h2>
        <div style="text-align: center; color: var(--text-muted);">
            <p>More projects coming soon!</p>
        </div>
    </section>
    <footer id="contact">
        <h2>Let's work together!</h2><br>
        <a href="mailto:your.email@example.com" class="btn">Email Me</a><br><br><br>
        <p>&copy; 2024 Sumit Kushwaha. <a href="https://github.com/sumit036-git" style="color: var(--primary-color); text-decoration: none;">GitHub: @sumit036-git</a></p>
    </footer>
</body>
</html>
